<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="1000" cy="100" r="60" fill="#ffd93d" opacity="0.9"/>
  
  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="200" cy="120" rx="60" ry="30"/>
    <ellipse cx="250" cy="110" rx="50" ry="25"/>
    <ellipse cx="180" cy="130" rx="40" ry="20"/>
    
    <ellipse cx="800" cy="80" rx="70" ry="35"/>
    <ellipse cx="860" cy="70" rx="55" ry="28"/>
    <ellipse cx="770" cy="90" rx="45" ry="22"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="450" width="1200" height="150" fill="url(#grassGradient)"/>
  
  <!-- Path/Walkway -->
  <path d="M500,600 Q600,500 700,600" fill="#fff" opacity="0.3"/>
  
  <!-- Main School Building -->
  <rect x="350" y="200" width="500" height="250" rx="10" fill="url(#buildingGradient)" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Building Roof -->
  <polygon points="330,200 600,120 870,200" fill="#ff6b6b"/>
  
  <!-- Clock Tower -->
  <rect x="560" y="100" width="80" height="100" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <polygon points="550,100 600,60 650,100" fill="#ff6b6b"/>
  <circle cx="600" cy="140" r="25" fill="white" stroke="#6c63ff" stroke-width="3"/>
  <line x1="600" y1="140" x2="600" y2="125" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="600" y1="140" x2="615" y2="140" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Windows Row 1 -->
  <g fill="#6c63ff" opacity="0.8">
    <rect x="380" y="230" width="50" height="60" rx="5"/>
    <rect x="450" y="230" width="50" height="60" rx="5"/>
    <rect x="700" y="230" width="50" height="60" rx="5"/>
    <rect x="770" y="230" width="50" height="60" rx="5"/>
  </g>
  
  <!-- Windows Row 2 -->
  <g fill="#6c63ff" opacity="0.8">
    <rect x="380" y="320" width="50" height="60" rx="5"/>
    <rect x="450" y="320" width="50" height="60" rx="5"/>
    <rect x="700" y="320" width="50" height="60" rx="5"/>
    <rect x="770" y="320" width="50" height="60" rx="5"/>
  </g>
  
  <!-- Main Entrance -->
  <rect x="540" y="330" width="120" height="120" rx="10" fill="#1a1a2e"/>
  <rect x="550" y="340" width="100" height="110" rx="8" fill="#2d2d44"/>
  <circle cx="600" cy="395" r="8" fill="#ffd93d"/>
  
  <!-- Sign Board -->
  <rect x="480" y="210" width="240" height="40" rx="5" fill="#6c63ff"/>
  <text x="600" y="237" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">TECH-BRIDGE ACADEMY</text>
  
  <!-- Flag -->
  <line x1="600" y1="60" x2="600" y2="120" stroke="#1a1a2e" stroke-width="3"/>
  <rect x="602" y="65" width="40" height="25" fill="#ff6b6b"/>
  
  <!-- Trees -->
  <g>
    <!-- Tree 1 -->
    <rect x="150" y="380" width="20" height="70" fill="#8B4513"/>
    <circle cx="160" cy="360" r="50" fill="#2ecc71"/>
    <circle cx="130" cy="380" r="35" fill="#27ae60"/>
    <circle cx="190" cy="375" r="40" fill="#2ecc71"/>
    
    <!-- Tree 2 -->
    <rect x="950" y="380" width="20" height="70" fill="#8B4513"/>
    <circle cx="960" cy="360" r="50" fill="#2ecc71"/>
    <circle cx="930" cy="380" r="35" fill="#27ae60"/>
    <circle cx="990" cy="375" r="40" fill="#2ecc71"/>
  </g>
  
  <!-- Students -->
  <!-- Student 1 -->
  <g transform="translate(250, 420)">
    <circle cx="0" cy="0" r="15" fill="#ffd93d"/>
    <rect x="-10" y="15" width="20" height="35" rx="5" fill="#6c63ff"/>
    <rect x="-12" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="2" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="-8" y="-5" width="16" height="8" rx="2" fill="#1a1a2e"/>
  </g>
  
  <!-- Student 2 -->
  <g transform="translate(300, 425)">
    <circle cx="0" cy="0" r="15" fill="#ffd93d"/>
    <rect x="-10" y="15" width="20" height="35" rx="5" fill="#ff6b6b"/>
    <rect x="-12" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="2" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="-8" y="-5" width="16" height="8" rx="2" fill="#8B4513"/>
  </g>
  
  <!-- Student 3 -->
  <g transform="translate(850, 430)">
    <circle cx="0" cy="0" r="15" fill="#ffd93d"/>
    <rect x="-10" y="15" width="20" height="35" rx="5" fill="#11998e"/>
    <rect x="-12" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="2" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="-8" y="-5" width="16" height="8" rx="2" fill="#1a1a2e"/>
  </g>
  
  <!-- Student 4 -->
  <g transform="translate(900, 420)">
    <circle cx="0" cy="0" r="15" fill="#ffd93d"/>
    <rect x="-10" y="15" width="20" height="35" rx="5" fill="#ff9ff3"/>
    <rect x="-12" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="2" y="50" width="10" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="-8" y="-5" width="16" height="8" rx="2" fill="#8B4513"/>
  </g>
  
  <!-- Books/Backpacks -->
  <rect x="235" y="445" width="15" height="20" rx="3" fill="#ff6b6b"/>
  <rect x="885" y="450" width="15" height="20" rx="3" fill="#6c63ff"/>
</svg>
