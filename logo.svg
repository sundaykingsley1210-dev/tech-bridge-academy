<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Icon - Bridge/Circuit Design -->
  <g transform="translate(10, 15)">
    <!-- Base -->
    <rect x="5" y="85" width="90" height="8" rx="4" fill="url(#logoGradient)"/>
    
    <!-- Left Tower -->
    <rect x="10" y="30" width="12" height="55" rx="3" fill="url(#logoGradient)"/>
    
    <!-- Right Tower -->
    <rect x="78" y="30" width="12" height="55" rx="3" fill="url(#logoGradient)"/>
    
    <!-- Bridge Arc -->
    <path d="M 16 50 Q 50 20 84 50" stroke="url(#logoGradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Tech Circuit Lines -->
    <circle cx="50" cy="35" r="8" fill="none" stroke="url(#logoGradient)" stroke-width="3"/>
    <circle cx="50" cy="35" r="3" fill="url(#logoGradient)"/>
    
    <!-- Connection Lines -->
    <line x1="22" y1="50" x2="42" y2="35" stroke="url(#logoGradient)" stroke-width="2"/>
    <line x1="78" y1="50" x2="58" y2="35" stroke="url(#logoGradient)" stroke-width="2"/>
    
    <!-- Data Dots -->
    <circle cx="30" cy="45" r="2" fill="#6c63ff"/>
    <circle cx="70" cy="45" r="2" fill="#ff6b6b"/>
  </g>
  
  <!-- Text -->
  <text x="120" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a1a2e">
    TECH-BRIDGE
  </text>
  <text x="120" y="95" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="url(#logoGradient)">
    ACADEMY
  </text>
</svg>
